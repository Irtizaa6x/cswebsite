<!-- ==================== PAGE HEADER COMPONENT ==================== -->
<!-- 
  This file contains the hero banner that appears at the top of inner pages.
  Title and subtitle are filled automatically by script.js from data.js.
  Loaded dynamically into <div id="page-header-placeholder"></div>.
  Not used on homepage.
-->

<section class="page-header" aria-label="Page header">
    <div class="container">
        <div class="page-header-content">
            <!-- Decorative hacker brackets -->
            <div class="header-decor left">
                <span class="bracket">&lt;</span><span class="tag">hacker</span><span class="bracket">&gt;</span>
            </div>
            
            <!-- Main title with glitch effect (3 layers for full effect) -->
            <h1 id="page-title" class="glitch-text" data-text="Page Title">
                <span class="glitch-layer" aria-hidden="true">Page Title</span>
                <span class="glitch-layer" aria-hidden="true">Page Title</span>
                <span class="glitch-layer" aria-hidden="true">Page Title</span>
                Page Title
            </h1>
            
            <!-- Animated neon underline -->
            <div class="title-underline"></div>
            
            <!-- Subtitle -->
            <p id="page-subtitle" class="page-subtitle">Page subtitle goes here</p>
            
            <!-- Decorative hacker brackets (right) -->
            <div class="header-decor right">
                <span class="bracket">&lt;/</span><span class="tag">hacker</span><span class="bracket">&gt;</span>
            </div>
        </div>
    </div>
</section>
