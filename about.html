<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="About GUCC Cyber Security Society – mission, vision, activities, and the team behind the cybersecurity club at Green University.">
    <meta name="keywords" content="about GUCC, cybersecurity club, mission, activities, Green University">
    <meta name="author" content="GUCC Cyber Security Society">
    <title>GUCC Cyber Security Society | About</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Fallback inline styles -->
    <style>
        body { background: #0a0a0f; color: #eef5ff; font-family: 'Inter', sans-serif; margin:0; padding:0; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .navbar, .footer { background: #050510; padding: 1rem; text-align: center; }
        .btn { display: inline-block; padding: 12px 28px; background: #00d9ff; color: #050510; border-radius: 40px; text-decoration: none; }
    </style>
</head>
<body id="about">

    <!-- ==================== DYNAMIC COMPONENT PLACEHOLDERS ==================== -->
    <div id="navbar-placeholder"></div>
    <div id="page-header-placeholder"></div>

    <!-- ==================== MAIN ABOUT SECTION (Dynamic) ==================== -->
    <section class="about">
        <div class="container">
            <div class="about-grid" id="aboutGrid"></div>
        </div>
    </section>

    <!-- ==================== ACTIVITIES SECTION (Dynamic) ==================== -->
    <section class="activities" style="background: var(--dark);">
        <div class="container">
            <div class="section-header">
                <h2>What We Do</h2>
                <p>Our core activities that shape future cybersecurity professionals</p>
            </div>
            <div class="activities-grid" id="aboutActivitiesGrid"></div>
        </div>
    </section>

    <!-- ==================== CALL TO ACTION SECTION ==================== -->
    <section class="ctf-promo" style="padding: 60px 0;">
        <div class="container">
            <div class="ctf-promo-card" style="padding: 40px 20px;">
                <h2>Ready to start your cybersecurity journey?</h2>
                <p>Join GUCC Cyber Security Society today and become a part of a growing community of defenders.</p>
                <a href="contact.html" class="btn btn-primary" style="margin-top: 20px;">Get Involved <i class="fas fa-arrow-right"></i></a>
            </div>
        </div>
    </section>

    <!-- ==================== FOOTER PLACEHOLDER ==================== -->
    <div id="footer-placeholder"></div>

    <!-- Scripts (order matters) -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
